services:
  invest-compass:
    build: .
    container_name: invest-compass
    restart: unless-stopped
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3456:3456"
    environment:
      NODE_ENV: production
      PORT: "3456"
      DB_PATH: /app/data/invest.db
      TZ: Asia/Shanghai
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      NODE_OPTIONS: "--max-old-space-size=512"
      # neodata 代理（金价查询需要）
      AUTH_GATEWAY_PORT: "19000"
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data:rw
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
