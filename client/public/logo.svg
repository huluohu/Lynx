<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Compass outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Compass needle (N-S) -->
  <polygon points="256,100 270,240 256,256 242,240" fill="#fff" opacity="0.95"/>
  <polygon points="256,412 270,272 256,256 242,272" fill="rgba(255,255,255,0.4)"/>
  <!-- Chart line overlay -->
  <polyline points="120,320 180,280 220,310 270,220 320,250 370,180 400,200" fill="none" stroke="#4fc3f7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="12" fill="#fff"/>
  <!-- Cardinal markers -->
  <circle cx="256" cy="88" r="6" fill="rgba(255,255,255,0.6)"/>
  <circle cx="256" cy="424" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="88" cy="256" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="424" cy="256" r="4" fill="rgba(255,255,255,0.3)"/>
</svg>
